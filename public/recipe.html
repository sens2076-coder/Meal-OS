<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 이유식 - 식단 생성</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">

        main { padding: 20px; }
        .generation-form {
            padding: 2rem;
        }
        .generation-form h2 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--color-mint);
            padding-bottom: 0.5rem;
        }
        textarea {
            width: 100%;
            min-height: 120px;
            border-radius: 8px;
            padding: 10px;
            border: 1px solid #ddd;
            margin-bottom: 1.5rem;
            font-size: 1rem;
            line-height: 1.6;
        }
        #generate-btn {
            width: 100%;
            padding: 1rem;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <header class="header-pc">
        <div class="container">
            <div class="logo">
                <a href="index.html">오늘의 이유식</a>
            </div>
            <nav class="nav-pc">
                <ul>
                    <li><a href="dashboard.html">대시보드</a></li>
                    <li><a href="recipe.html">식단 생성</a></li>
                    <li><a href="shopping.html">장보기</a></li>
                    <li><a href="nutrition.html">영양 분석</a></li>
                    <li><a href="settings.html">설정</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <h1 class="fade-in-up">식단 생성하기</h1>
        <p class="fade-in-up">AI를 활용해 우리 아기 맞춤 식단을 만들어보세요. 마트 전단지 내용, 남은 재료, 특이사항을 입력하고 '식단 생성' 버튼을 누르세요.</p>
        
        <div class="card generation-form fade-in-up" style="animation-delay: 0.2s;">
            <h2>마트 전단지 내용 할인정보 (선택)</h2>
            <textarea id="flyer-text" placeholder="예: 한우 안심 100g 7,000원 세일! 유기농 브로콜리 2,500원"></textarea>

            <h2>집에 있는 재료 (선택)</h2>
            <textarea id="leftovers" placeholder="예: 양파 1개, 당근 1/2개, 두부 반 모, 닭고기 안심 100g"></textarea>

            <h2>요청 사항 (선택)</h2>
            <textarea id="special-requests" placeholder="예: 계란 알러지가 있어요. 소고기는 꼭 포함해주세요. 아기가 핑거푸드를 좋아해요."></textarea>
            
            <button id="generate-btn" class="btn btn-primary">AI 식단 생성하기</button>
        </div>
    </main>
    
    <nav class="nav-mobile">
        <a href="dashboard.html">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M4 13h6v6H4zm0-10h6v6H4zm8 10h6v6h-6zm0-10h6v6h-6z"></path></svg>
            대시보드
        </a>
        <a href="recipe.html" class="active">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M16.84 2.16c.33-.33.82-.56 1.34-.65A3.5 3.5 0 0122 5.02c-.09.52-.32 1.01-.65 1.34l-2.52 2.52-3.54-3.54L16.84 2.16zM2 20.25c0 .97.78 1.75 1.75 1.75h4.5c.97 0 1.75-.78 1.75-1.75v-4.5c0-.97-.78-1.75-1.75-1.75H3.75C2.78 14 2 14.78 2 15.75v4.5zm8-1.5H3.5v-3h5v3zm-3.5-9L4 7.25l3.54-3.54 2.52 2.52-3.54 3.54L4 7.25z"></path></svg>
            식단 생성
        </a>
        <a href="shopping.html">
             <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2zm-1.45-5L17.17 12H7.21l.93-2H18v2H8.53l-.94-2H18V6H6.16l-.7-2H3v2h2l3.6 7.59L6.5 14.01V15h12v-2H8.55z"></path></svg>
            장보기
        </a>
        <a href="settings.html">
             <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12-.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"></path></svg>
            설정
        </a>
    </nav>
    <script src="js/app.js" defer></script>
    <script src="js/storage.js"></script>
    <script src="js/gemini.js"></script>
    <script>
        document.getElementById('generate-btn').addEventListener('click', async (e) => {
            e.target.disabled = true;
            e.target.textContent = '생성중...';

            const flyerText = document.getElementById('flyer-text').value;
            const leftovers = document.getElementById('leftovers').value;
            const specialRequests = document.getElementById('special-requests').value;
            
            if (!flyerText && !leftovers && !specialRequests) {
                alert('하나 이상의 필드를 채워주세요.');
                e.target.disabled = false;
                e.target.textContent = 'AI 식단 생성하기';
                return;
            }

            try {
                const mealPlan = await generateMealPlan(flyerText, leftovers, specialRequests);
                
                if (mealPlan && mealPlan.week_schedule) {
                    const storage = getStorage();
                    storage.week_schedule = mealPlan.week_schedule;
                    updateStorage(storage);
                    alert('식단이 생성되었습니다! 대시보드에서 확인하세요.');
                    window.location.href = 'dashboard.html';
                } else {
                    alert('식단 생성에 실패했습니다. 반환된 데이터 형식이 올바르지 않습니다.');
                    e.target.disabled = false;
                    e.target.textContent = 'AI 식단 생성하기';
                }
            } catch (error) {
                console.error("Error during meal plan generation:", error);
                alert("식단 생성 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.");
                e.target.disabled = false;
                e.target.textContent = 'AI 식단 생성하기';
            }
        });
    </script>
</body>
</html>

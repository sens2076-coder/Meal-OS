
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 뭐 먹지?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="theme-toggle">
                <button id="theme-btn">🌙</button>
            </div>
            <h1>오늘 뭐 먹지?</h1>
            <div id="food-display"></div>
            <button id="pick-food">골라줘!</button>
        </div>

        <div class="contact-section">
            <div class="contact-container">
                <h2>제휴 문의</h2>
                <form action="https://formspree.io/f/mrearkge" method="POST">
                    <div class="input-group">
                        <label for="name">성함/업체명</label>
                        <input type="text" id="name" name="name" placeholder="홍길동 / 맛집나라" required>
                    </div>
                    <div class="input-group">
                        <label for="email">이메일 주소</label>
                        <input type="email" id="email" name="_replyto" placeholder="example@email.com" required>
                    </div>
                    <div class="input-group">
                        <label for="message">문의 내용</label>
                        <textarea id="message" name="message" rows="4" placeholder="문의하실 내용을 상세히 적어주세요." required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">보내기</button>
                </form>
            </div>
        </div>

        <div class="disqus-section">
            <div id="disqus_thread"></div>
            <script>
                /**
                *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.

                this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
                this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
                };
                */
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://productbuilder-raaicrudfo.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>

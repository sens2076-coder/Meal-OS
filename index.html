<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>루나의 신비로운 타로 관찰소 | Luna's Tarot</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="stars"></div>
    <div class="twinkling"></div>

    <div class="container">
        <header>
            <h1 class="mystic-title">Luna's Tarot</h1>
            <p class="subtitle">✨ 당신의 영혼이 보내는 작은 신호에 귀를 기울여보세요 ✨</p>
        </header>

        <main>
            <section id="input-section" class="fade-in">
                <div class="crystal-ball-container">
                    <div class="crystal-ball"></div>
                </div>
                <div class="chat-box">
                    <p class="ai-greeting">"어서 오세요. 당신의 어떤 이야기를 들어드릴까요?"</p>
                    <textarea id="user-query" placeholder="고민이나 질문을 편하게 남겨주세요... (예: 올해의 연애운이 궁금해요)"></textarea>
                    
                    <div class="mode-selection">
                        <div class="mode-card" id="mode-3-cards">
                            <div class="mode-icon">✨</div>
                            <h3>무료 3장 뽑기</h3>
                            <p>과거/현재/미래의 흐름을 가볍게 읽어드려요.</p>
                            <button class="mystic-button mini">선택하기</button>
                        </div>
                        <div class="mode-card premium" id="mode-10-cards">
                            <div class="mode-icon">💎</div>
                            <h3>심층 10장 뽑기</h3>
                            <p>켈틱 크로스 배열로 당신의 운명을 낱낱이 분석합니다.</p>
                            <span class="premium-badge">Premium</span>
                            <button class="mystic-button mini gold">선택하기</button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="tarot-table" class="hidden">
                <div class="cards-display" id="selected-cards">
                    <!-- 뽑힌 카드가 여기에 동적으로 생성됩니다 -->
                </div>
                <div id="ai-response" class="response-container hidden">
                    <div class="loading-spinner">✨ 루나가 별의 지도를 읽고 있어요... ✨</div>
                    <div id="response-text" class="response-content"></div>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2024 Luna's Tarot Office. All rights reserved.</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>

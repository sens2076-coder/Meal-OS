<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEAL OS - 식단 결과</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <style>
    .loading-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: var(--brand-cream);
      z-index: 3000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .result-header {
      background: var(--brand-forest);
      color: white;
      padding: 40px 0;
      text-align: center;
    }
    .result-header h2 { font-family: var(--font-brand); margin-bottom: 8px; }
    .nav-tabs {
      position: sticky;
      top: 64px;
      z-index: 900;
      background: white;
      border-bottom: 2px solid var(--brand-mint);
      display: flex;
      overflow-x: auto;
    }
    .nav-tabs .tab-btn {
      flex: 1;
      white-space: nowrap;
      border-radius: 0;
      padding: 16px;
    }
    .meal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding: 20px 0;
    }
    .meal-card .meal-day-header {
      background: var(--brand-forest);
      color: white;
      padding: 8px;
      border-radius: 8px;
      text-align: center;
      margin-bottom: 12px;
    }
    .meal-slot { padding: 12px; border-radius: 12px; margin-bottom: 8px; }
    .lunch { background: var(--brand-mint); }
    .dinner { background: #E0F2FE; } /* Sky-ish color for dinner */
    .slot-label { font-size: 0.75rem; font-weight: 700; color: var(--brand-stone); }
    .main-menu { font-weight: 700; margin: 4px 0; }
    .sides { font-size: 0.9rem; color: var(--brand-stone); }
    
    .shopping-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-bottom: 1px solid var(--brand-mint); }
    .shopping-item.sale { background: var(--brand-paper); }
    .item-qty { margin-left: auto; font-weight: 700; }
    
    .radar-svg { width: 100%; max-width: 300px; margin: 0 auto; display: block; }
    .recipe-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 16px 0; }
    .cube-tip { background: var(--brand-paper); padding: 12px; border-left: 4px solid var(--brand-lavender); border-radius: 4px; }
    
    @media (max-width: 767px) {
      .recipe-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="loadingOverlay" class="loading-overlay">
    <svg class="loader-leaf" viewBox="0 0 24 24">
      <path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8.12,20C11,20 14,18 16,15C17.53,12.72 19.14,11.37 21,10.5L20,8.5C18.45,9.22 17.19,10.18 16,11.38C15.41,8.15 12.1,6 8,6C7.33,6 6.67,6.06 6,6.17C5.9,4.24 7.03,2.5 8.78,1.6L7.84,0C5.06,1.4 3.42,4.24 3.5,7.22C2.5,8.14 1.87,9.41 1.87,10.8C1.87,13.12 3.46,15.06 5.59,15.65C6.08,12.3 8.35,9.58 11.32,8.44C12.43,8.03 13.62,7.85 14.82,7.94C15.53,7.96 16.27,8.03 17,8Z" />
    </svg>
    <p id="loadingMsg" style="margin-top: 24px; font-weight: 700; color: var(--brand-forest);">전단지를 분석하고 있어요...</p>
  </div>

  <header>
    <div class="container">
      <a href="index.html" style="display: flex; align-items: center; gap: 8px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--brand-stone)"><path d="M20,11H7.83L13.42,5.41L12,4L4,12L12,20L13.41,18.59L7.83,13H20V11Z"/></svg>
        새 식단 만들기
      </a>
      <div class="logo">
        <span class="logo-text">MEAL OS</span>
      </div>
    </div>
  </header>

  <div class="result-header">
    <div class="container">
      <h2>이번 주 식단이 완성됐어요 🎉</h2>
      <p id="weekSummary" style="opacity: 0.8;"></p>
    </div>
  </div>

  <nav class="nav-tabs">
    <button class="tab-btn active" data-target="tabMeal">📅 주간 식단</button>
    <button class="tab-btn" data-target="tabShop">🛒 장보기</button>
    <button class="tab-btn" data-target="tabRecipe">👨‍🍳 레시피</button>
    <button class="tab-btn" data-target="tabNutri">📊 영양 분석</button>
  </nav>

  <main class="container" style="padding: 40px 20px;">
    <!-- 탭 1: 주간 식단 -->
    <div id="tabMeal" class="tab-content">
      <div id="mealPlanGrid" class="meal-grid"></div>
      <div id="thawScheduleContainer" class="card" style="margin-top: 40px; border-left: 4px solid var(--brand-amber);">
        <h4 style="margin-bottom: 16px;">🧊 해동 알람 리스트</h4>
      </div>
    </div>

    <!-- 탭 2: 장보기 리스트 -->
    <div id="tabShop" class="tab-content" style="display: none;">
      <div id="shoppingListContainer" class="card"></div>
      <div style="margin-top: 24px; display: flex; gap: 12px;">
        <button class="btn-primary" style="flex: 1;">📋 리스트 복사</button>
        <button class="btn-cta" style="flex: 1;">📤 공유하기</button>
      </div>
    </div>

    <!-- 탭 3: 레시피 -->
    <div id="tabRecipe" class="tab-content" style="display: none;">
      <div id="recipeContainer" style="display: grid; gap: 24px;"></div>
    </div>

    <!-- 탭 4: 영양 분석 -->
    <div id="tabNutri" class="tab-content" style="display: none;">
      <div class="card" style="text-align: center; margin-bottom: 24px;">
        <h4>7대 필수 영양소 밸런스</h4>
        <div id="nutritionRadar"></div>
      </div>
      <div id="smartBackupContainer" style="display: grid; gap: 16px;">
        <h4 style="margin: 20px 0 10px;">🛡️ 거부 시 시크릿 백업 플랜</h4>
      </div>
    </div>
  </main>

  <script src="assets/js/storage.js"></script>
  <script src="assets/js/gemini.js"></script>
  <script src="assets/js/result.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 이유식 - 장보기 목록</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        main { padding: 20px; }
        .shopping-card { padding: 2rem; }
        .category-section h3 {
            font-size: 1.2rem;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #eee;
        }
        .category-section ul {
            list-style: none;
            padding: 0;
        }
        .category-section li {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f5f5f5;
        }
        .category-section li:last-child { border-bottom: none; }
        .category-section label {
            flex-grow: 1;
            margin-left: 12px;
            font-size: 1.1rem;
        }
        input[type="checkbox"]:checked + label {
            text-decoration: line-through;
            color: #999;
        }
        .category-section span { 
            font-weight: 700;
            font-size: 1.1rem;
        }
        .sale-item label { color: var(--color-amber); }
        .total-cost {
            margin-top: 2rem;
            text-align: right;
            font-size: 1.4rem;
            font-weight: 700;
        }
    </style>
</head>

    <header class="header-pc"> 
        <div class="container">

            </nav>
        </div>
    </header>

    <main class="container">
        <h1 class="fade-in-up">장보기 목록</h1>
        <div class="card shopping-card fade-in-up" style="animation-delay: 0.2s;">
            <div id="shopping-list">
                <!-- JS will render the list here -->
            </div>
            <div class="total-cost">
                예상 총액: <span id="total-cost">0원</span>
